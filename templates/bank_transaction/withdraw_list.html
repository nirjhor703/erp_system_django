{% extends "base.html" %}
{% load static %}

{% block title %}Add Payment{% endblock %}

{% block content %}

<div class="container-fluid mt-4">

    <div class="card shadow" style="min-height: 85vh;">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <!-- <h5 class="mb-0">Add Pharmacy Purchase</h5> -->

                <!-- <a href="{% url 'medicine-list' %}" 
                    class="btn btn-light btn-sm">
                    <i class="fas fa-times"></i>
                </a> -->

                <a href="{% url 'add_withdraw_page' %}" 
                    class="btn btn-info text-white fw-bold">
                    + Add Withdraw
                </a>                


                <!-- FILTER FORM -->
                <form method="get" class="row g-2 align-items-end mb-2">

                    <div class="col-md-3">
                        <input type="text" name="search" class="form-control" placeholder="Search by user" value="{{ search }}">
                    </div>

                    <div class="col-md-2">
                        <select name="status" class="form-select">
                            <option value="">Status</option>
                            <option value="1" {% if status_filter == '1' %}selected{% endif %}>Verified</option>
                            <option value="0" {% if status_filter == '0' %}selected{% endif %}>Non Verified</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="small fw-semibold">Start Date</label>
                        <input type="date" id="start_date" name="start_date" class="form-control" value="{{ start_date }}">
                    </div>

                    <div class="col-md-2">
                        <label class="small fw-semibold">End Date</label>
                        <input type="date" id="end_date" name="end_date" class="form-control" value="{{ end_date }}">
                    </div>

                    <div class="col-md-2">
                        <select id="perPage" name="per_page" class="form-select">
                            {% for n in per_page_options %}
                                <option value="{{ n }}" {% if per_page == n %}selected{% endif %}>{{ n }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-1 d-grid">
                        <button class="btn btn-primary">Filter</button>
                    </div>

                </form>
            </div>
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-12">

                    <!-- DATE / STORE / LOCATION -->
                    <div class="row g-2 mb-1">
                        <div class="col-md-4">
                            <label class="fw-semibold" style="display:inline-block; width:120px;">Location</label>
                            <select name="location" style="width:150px;" class="form-control-sm location-select"></select>
                        </div>
                    </div>

                    <!-- SUPPLIER -->
                    <div class="row mb-1">
                        <div class="col-md-7">
                            <label class="fw-semibold" style="display:inline-block; width:120px;">Bank Name</label>
                            <select name="bank" class="form-control-sm bank-select"></select>
                        </div>

                    </div>

                    <!-- PRODUCT SEARCH -->
                    <div class="row mb-1">
                        <div class="col-md-6">
                            <label class="fw-semibold" style="display:inline-block; width:120px;">Supplier</label>
                            <!-- <input type="text" id="productSearch" class="form-control form-control-sm" autocomplete="off"> -->
                            <input type="text" id="supplierSearch" class="form-control-sm" style="width: 500px;" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label class="fw-semibold">ID</label>
                            <input type="number" id="productid" class="form-control-sm" readonly>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" id="addProductBtn" class="btn btn-success w-100">Add</button>
                        </div>                        
                    </div>     


                </div>


                <div class="card mb-4">
                    <div class="card-header bg-success text-white text-center">
                        Withdraw List
                    </div>

                    <div class="table-responsive" style="max-height:300px; overflow-y:auto;">
                        <table class="table table-bordered table-sm">
                            <thead class="table-light sticky-top">
                                <tr>
                                    <th style="width: 3%;">SL</th>
                                    <th style="width: 10%;">Tran_ID</th>
                                    <th style="width: 10%;">Date</th>   
                                    <th style="width: 10%;">Supplier</th>                                 
                                    <th style="width: 20%;">Tran_user</th>
                                    <th style="width: 6%; text-align:right;">Bill Total</th>
                                    <th style="width: 6%; text-align:right;">Discount</th>
                                    <th style="width: 6%; text-align:right;">Net Total</th>
                                    <th style="width: 6%; text-align:right;">Advance</th>
                                    <th style="width: 6%; text-align:right;">Due Col</th>
                                    <th style="width: 6%; text-align:right;">Due Discount</th>
                                    <th style="width: 6%; text-align:right;">Due</th>
                                    <th style="width: 30%; text-align:center;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="purchaseListTableBody"></tbody>
                        </table>
                    </div>
                </div>                    

                <!-- <div class="text-center">
                    <button type="submit" class="btn btn-primary px-5">Submit</button>
                </div> -->

                <div class="text-center">
                    <button type="button" id="saveAllBtn" class="btn btn-primary px-5">Save</button>
                    <button id="printReportBtn" class="btn btn-dark px-4">
                        Print / Download PDF
                    </button>
                </div>

            </div>

        </div>
    </div>

</div>



{% endblock %}

{% block extra_js %}
<script>
    window.APP_URLS = {
        DIVISION_COMBO_URL: "{% url 'get_divisions_combo' %}",
        SUPPLIER_COMBO_URL: "{% url 'get_supplier_combo' %}",
        STORE_COMBO_URL: "{% url 'get_store_combo' %}",
        BANK_COMBO_URL: "{% url 'get_bank_combo' %}",
    };
</script>
<script>
    
</script>

<script src="{% static 'js/location/location_load_combo.js' %}"></script>
<script src="{% static 'js/bank_load_combo.js' %}"></script>
<script src="{% static 'js/store/store_load_combo.js' %}"></script>
<script src="{% static 'js/pharmacy/payment/payment_list.js' %}"></script>


{% endblock %}
